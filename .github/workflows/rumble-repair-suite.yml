name: Rumble Repair Suite

on:
  pull_request:
    paths:
      - 'tools/rumble/**'
      - '.github/workflows/rumble-repair-suite.yml'
  push:
    branches:
      - main
    paths:
      - 'tools/rumble/**'
      - '.github/workflows/rumble-repair-suite.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rumble-repairs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run complete Rumble repair suite
        run: node --test tools/rumble/*.test.mjs
